version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-gnu5}_nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./gnuboard:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - php
    networks:
      - ${PROJECT_NAME:-gnu5}_network
    restart: unless-stopped
    profiles:
      - nginx

  php:
    build:
      context: .
      dockerfile: Dockerfile.php
      args:
        PHP_VERSION: ${PHP_VERSION:-8.1}
    container_name: ${PROJECT_NAME:-gnu5}_php
    volumes:
      - ./gnuboard:/var/www/html
      - ./logs/php:/var/log
      - ./php/php.ini:/usr/local/etc/php/php.ini
      - ./php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    depends_on:
      - mysql
      - redis
    networks:
      - ${PROJECT_NAME:-gnu5}_network
    restart: unless-stopped
    environment:
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT:-256M}
      - PHP_MAX_EXECUTION_TIME=${PHP_MAX_EXECUTION_TIME:-300}
      - PHP_UPLOAD_MAX_FILESIZE=${PHP_UPLOAD_MAX_FILESIZE:-100M}
      - PHP_POST_MAX_SIZE=${PHP_POST_MAX_SIZE:-100M}

  mysql:
    image: mysql:8.0
    container_name: ${PROJECT_NAME:-gnu5}_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gnuboard}
      MYSQL_USER: ${MYSQL_USER:-gnuboard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gnuboard123}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - ${PROJECT_NAME:-gnu5}_mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
      - ./logs/mysql:/var/log/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - ${PROJECT_NAME:-gnu5}_network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:alpine
    container_name: ${PROJECT_NAME:-gnu5}_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${PROJECT_NAME:-gnu5}_redis_data:/data
      - ./logs/redis:/var/log/redis
    networks:
      - ${PROJECT_NAME:-gnu5}_network
    restart: unless-stopped
    command: redis-server --appendonly yes --loglevel notice

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ${PROJECT_NAME:-gnu5}_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER:-gnuboard}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-gnuboard123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - "${PMA_PORT:-8080}:80"
    depends_on:
      - mysql
    networks:
      - ${PROJECT_NAME:-gnu5}_network
    restart: unless-stopped

volumes:
  ${PROJECT_NAME:-gnu5}_mysql_data:
  ${PROJECT_NAME:-gnu5}_redis_data:

networks:
  ${PROJECT_NAME:-gnu5}_network:
    driver: bridge
