[PHP]
; 기본 설정
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
post_max_size = 100M
upload_max_filesize = 100M
max_file_uploads = 20

; 에러 설정
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php_errors.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; 세션 설정
session.gc_maxlifetime = 1440
session.cookie_lifetime = 0
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
session.save_handler = files
session.save_path = "/tmp"

; 날짜 설정
date.timezone = Asia/Seoul

; 문자 인코딩
default_charset = "UTF-8"
mbstring.internal_encoding = UTF-8
mbstring.http_output = UTF-8
mbstring.encoding_translation = Off
mbstring.func_overload = 0

; 보안 설정
expose_php = Off
allow_url_fopen = On
allow_url_include = Off
file_uploads = On
max_input_vars = 3000

; OPcache 설정 (SIGSEGV 문제로 비활성화)
opcache.enable = 0
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 2
opcache.fast_shutdown = 0
opcache.validate_timestamps = 1
opcache.save_comments = 1
; PHP 8.1 SIGSEGV 버그 해결을 위해 JIT 비활성화
opcache.jit = off
opcache.jit_buffer_size = 0

; PCRE JIT 비활성화 - PHP 8.1에서 SIGSEGV 발생 원인
pcre.jit = 0

; 그누보드5 특화 설정
; 이미지 처리
gd.jpeg_ignore_warning = 1

; 파일 업로드
upload_tmp_dir = /tmp

; 메일 설정
sendmail_path = /usr/sbin/sendmail -t -i

; 확장 모듈 (Dockerfile에서 설치됨)
; extension=gd
; extension=mysqli
; extension=pdo_mysql
; extension=mbstring
; extension=openssl
; extension=curl
; extension=zip
; extension=redis
; extension=apcu
; extension=xml
; extension=xsl
; extension=intl
; extension=gettext
; extension=opcache

; 환경 변수로 설정 가능 (PHP는 직접 환경 변수 치환을 지원하지 않으므로 기본값 사용)
; 실제 값은 docker-entrypoint 스크립트나 PHP-FPM 설정에서 처리
; 기본값: 256M
memory_limit = 256M
max_execution_time = 300
upload_max_filesize = 100M
post_max_size = 100M 